# The Discord server to audit.
guildId: "YOUR_GUILD_ID"

search:
  # How many emojis to audit at most.
  # Use null to include all matching emojis.
  # Example: 100
  maxEmojis: null

  # Only count usage on or after this time.
  # You can fill a snowflake or a normal date/time value.
  # Examples:
  # after: "2025-01-01"
  # after: "2025-01-01T00:00:00Z"
  # after: "1200000000000000000"
  after: null

  # Only count usage on or before this time.
  # Same format as "after".
  before: null

  # true = only animated emojis
  # false = only static emojis
  # null = do not filter by animation
  animated: null

  # true = only available emojis
  # false = only unavailable emojis
  # null = do not filter by availability
  available: null

  # true = only managed emojis
  # false = only unmanaged emojis
  # null = do not filter by managed state
  managed: null

  # Only audit these emoji names.
  # Leave empty to allow all names.
  # Example:
  # onlyEmojiNames: ["pepeLaugh", "catJam"]
  onlyEmojiNames: []

  # Skip these emoji names.
  # Leave empty to skip none.
  # Example:
  # skipEmojiNames: ["deprecated_1", "deprecated_2"]
  skipEmojiNames: []

output:
  # Where reports will be written.
  dir: "./output"

  # Length of the latest message preview in the report.
  excerptLength: 30

runtime:
  # How many emojis to process at the same time.
  # Higher values are faster, but also more aggressive.
  concurrency: 2

  # Discord API version to use.
  apiVersion: "9"

  # How many times to retry temporary request failures.
  maxRequestRetries: 6

  # Starting delay between retries, in milliseconds.
  retryBaseMs: 750

  # Maximum wait time before retrying a search, in milliseconds.
  indexRetryCapMs: 15000

  # Show rate-limit related logs.
  logRateLimits: true
